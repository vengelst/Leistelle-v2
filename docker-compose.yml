services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leitstelle}
      POSTGRES_USER: ${POSTGRES_USER:-leitstelle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leitstelle}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PUBLIC_PORT:-55440}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_VERSION: ${APP_VERSION:-docker}
      DATABASE_URL: ${DATABASE_URL:-postgres://leitstelle:leitstelle@db:5432/leitstelle}
      HTTP_HOST: ${HTTP_HOST:-0.0.0.0}
      HTTP_PORT: ${HTTP_PORT:-8080}
      HTTP_TRUST_PROXY: ${HTTP_TRUST_PROXY:-true}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-8}
      AUTH_BOOTSTRAP_PASSWORD: ${AUTH_BOOTSTRAP_PASSWORD:?Set AUTH_BOOTSTRAP_PASSWORD via .env.production or environment}
      ALLOW_DESTRUCTIVE_SEED: ${ALLOW_DESTRUCTIVE_SEED:-false}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?Set FRONTEND_ORIGIN via .env.production or environment}
      MEDIA_STORAGE_TYPE: ${MEDIA_STORAGE_TYPE:-reference}
      MEDIA_STORAGE_BASE_URL: ${MEDIA_STORAGE_BASE_URL:-}
      MEDIA_STORAGE_LOCAL_PATH: ${MEDIA_STORAGE_LOCAL_PATH:-}
      ALARM_EXTERNAL_INGESTION_SHARED_SECRET: ${ALARM_EXTERNAL_INGESTION_SHARED_SECRET:-}
      ALARM_EXTERNAL_MEDIA_INGESTION_SHARED_SECRET: ${ALARM_EXTERNAL_MEDIA_INGESTION_SHARED_SECRET:-}
      ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_SECONDS: ${ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_SECONDS:-30}
      ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_GRUNDIG_SECONDS: ${ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_GRUNDIG_SECONDS:-}
      ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_DAHUA_SECONDS: ${ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_DAHUA_SECONDS:-}
      ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_HIKVISION_SECONDS: ${ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_HIKVISION_SECONDS:-}
      ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_AJAX_SECONDS: ${ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_AJAX_SECONDS:-}
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PUBLIC_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      FRONTEND_API_BASE_URL: ${FRONTEND_API_BASE_URL:-}
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_PUBLIC_PORT:-4173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: workers/runtime/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_VERSION: ${APP_VERSION:-docker}
      DATABASE_URL: ${DATABASE_URL:-postgres://leitstelle:leitstelle@db:5432/leitstelle}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-8}
      AUTH_BOOTSTRAP_PASSWORD: ${AUTH_BOOTSTRAP_PASSWORD:?Set AUTH_BOOTSTRAP_PASSWORD via .env.production or environment}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?Set FRONTEND_ORIGIN via .env.production or environment}
      MEDIA_STORAGE_TYPE: ${MEDIA_STORAGE_TYPE:-reference}
      MEDIA_STORAGE_BASE_URL: ${MEDIA_STORAGE_BASE_URL:-}
      MEDIA_STORAGE_LOCAL_PATH: ${MEDIA_STORAGE_LOCAL_PATH:-}
      ALARM_AUTO_ASSIGNMENT_LIGHT_ENABLED: ${ALARM_AUTO_ASSIGNMENT_LIGHT_ENABLED:-false}
      ALARM_EXTERNAL_INGESTION_SHARED_SECRET: ${ALARM_EXTERNAL_INGESTION_SHARED_SECRET:-}
      ALARM_EXTERNAL_MEDIA_INGESTION_SHARED_SECRET: ${ALARM_EXTERNAL_MEDIA_INGESTION_SHARED_SECRET:-}
      ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_SECONDS: ${ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_SECONDS:-30}
      ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_GRUNDIG_SECONDS: ${ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_GRUNDIG_SECONDS:-}
      ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_DAHUA_SECONDS: ${ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_DAHUA_SECONDS:-}
      ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_HIKVISION_SECONDS: ${ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_HIKVISION_SECONDS:-}
      ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_AJAX_SECONDS: ${ALARM_EXTERNAL_MEDIA_CORRELATION_TOLERANCE_AJAX_SECONDS:-}
      WORKER_MONITORING_ENABLED: ${WORKER_MONITORING_ENABLED:-true}
      WORKER_MONITORING_INTERVAL_SECONDS: ${WORKER_MONITORING_INTERVAL_SECONDS:-30}
      WORKER_MONITORING_RUN_ON_STARTUP: ${WORKER_MONITORING_RUN_ON_STARTUP:-true}
    healthcheck:
      test: ["CMD-SHELL", "test -r /proc/1/cmdline && tr '\\000' ' ' </proc/1/cmdline | grep -q 'workers/runtime/dist/index.js'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
