server {
  listen 80;
  server_name stage.leitstelle.vivahome.de;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name stage.leitstelle.vivahome.de;

  ssl_certificate /etc/letsencrypt/live/stage.leitstelle.vivahome.de/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/stage.leitstelle.vivahome.de/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:LeitstelleStageSSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 64m;

  location /api/ {
    proxy_pass http://127.0.0.1:28080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120s;
  }

  location /media/ {
    alias /opt/leitstelle-stage/media/;
    add_header Cache-Control "private, max-age=60";
    try_files $uri =404;
  }

  location / {
    proxy_pass http://127.0.0.1:4273;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120s;
  }
}
